<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Number Lookup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    input[type="text"] {
      padding: 8px;
      font-size: 16px;
      width: 250px;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }
    #locationDisplay {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Phone Number Lookup</h1>
  <input type="text" id="phoneNumber" placeholder="Enter phone number" />
  <button onclick="lookupPhone()">Lookup Phone</button>
  <div id="locationDisplay"></div>

  <script>
    async function lookupPhone() {
      const displayDiv = document.getElementById('locationDisplay');
      const phoneNumber = document.getElementById('phoneNumber').value.trim();

      if (!phoneNumber) {
        alert('Please enter a phone number.');
        return;
      }

      const apiKey = 'eca704b5c3519891f0af4de86ba9a212'; // Your API key
      const url = `https://apilayer.net/api/validate?access_key=${apiKey}&number=${encodeURIComponent(phoneNumber)}`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.valid) {
          displayDiv.innerHTML = `
            <h3>Details for ${phoneNumber}:</h3>
            <p>Country: ${data.country_name}</p>
            <p>Location: ${data.location}</p>
            <p>Carrier: ${data.carrier}</p>
            <p>Line type: ${data.line_type}</p>
          `;
        } else {
          displayDiv.innerHTML = `<p>Invalid phone number or data not available.</p>`;
        }
      } catch (error) {
        displayDiv.innerHTML = `<p>Error: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
